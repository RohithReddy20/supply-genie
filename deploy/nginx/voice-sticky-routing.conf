# NGINX reverse-proxy sticky routing template for voice websocket traffic.
#
# This uses IP-hash affinity to keep one client IP on one upstream backend.
# Replace backend hostnames/ports with your deployment values.

upstream supply_genie_backend {
    ip_hash;
    server backend-1.internal:8000 max_fails=3 fail_timeout=10s;
    server backend-2.internal:8000 max_fails=3 fail_timeout=10s;
    keepalive 64;
}

server {
    listen 443 ssl;
    server_name api.example.com;

    # /api/v1/voice/media-stream is websocket and can run for long durations.
    location /api/v1/voice/media-stream {
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;

        proxy_pass http://supply_genie_backend;
    }

    location /api/v1/ {
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 30s;
        proxy_read_timeout 90s;
        proxy_send_timeout 90s;

        proxy_pass http://supply_genie_backend;
    }
}
